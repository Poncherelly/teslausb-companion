name: Build baseline teslausb Pi image

# Milestone A of the pi-gen distribution work (see project plan/CHANGELOG):
# builds teslausb's own existing image, unmodified, via its real upstream
# pi-gen integration — no stage_companion yet. This validates the CI
# mechanics (disk space, ARM emulation via binfmt_misc, artifact/release
# handling) in isolation before our own script risk gets added on top.
# Runs pi-gen natively on the runner (build.sh), not via build-docker.sh —
# see the "Install pi-gen build dependencies" step below for why.
#
# Manual trigger only, deliberately — this is a first, unproven attempt;
# don't burn CI time or create noise on every push until it's reliable.
on:
  workflow_dispatch: {}

# Both external repos are pinned to specific commits rather than floating
# branches: teslausb itself pins no pi-gen version, and there's no
# regression history yet to fall back on for a first build. Bump these
# deliberately (re-verifying prepare.sh's assumptions still hold), not
# accidentally.
#
# PI_GEN_REF specifically must stay bookworm-compatible: teslausb's own
# pi-gen-config hardcodes RELEASE=bookworm (not ours to change — Milestone
# A builds teslausb's image unmodified), but pi-gen's master has since
# drifted to assume Raspberry Pi packages that only exist for their newer
# "trixie" apt suite (rpi-swap, rpi-usb-gadget, rpi-connect-lite, etc. —
# confirmed absent from archive.raspberrypi.com's bookworm suite entirely,
# including its beta component). This pin (9ea6e44d..., "stage2: enable
# pdiffs", 2025-06-05) is the last commit before "stage2: replace
# dphys-swapfile with rpi-swap" (22601c0, 2025-08-19) introduced the first
# such package — real, any user following teslausb's own build docs
# ("clone pi-gen" with no pin) hits this exact break today.
env:
  PI_GEN_REF: 9ea6e44d64a393563eeb4f51c0de864e5335b7c1
  TESLAUSB_REF: fb4ed15b46dc41a2ec7c8a7a2fe0783ce1d2ffd9

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write # needed to create the draft release
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # Load-bearing, not optional: standard runners start with ~14GB
      # free, and pi-gen's own docs describe needing "tens of gigabytes"
      # for WORK_DIR across even a short STAGE_LIST.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          tool-cache: true
          swap-storage: false

      - name: Checkout pi-gen
        uses: actions/checkout@v4
        with:
          repository: RPi-Distro/pi-gen
          ref: ${{ env.PI_GEN_REF }}
          path: pi-gen

      - name: Checkout teslausb
        uses: actions/checkout@v4
        with:
          repository: marcone/teslausb
          ref: ${{ env.TESLAUSB_REF }}
          path: teslausb

      # Real bug in teslausb's own script, reported upstream (see
      # marcone/teslausb issue tracker): 00-teslausb-tweaks/00-run.sh
      # unconditionally does `systemctl disable resize2fs_once`,
      # `update-rc.d resize2fs_once remove`, and `rm
      # /etc/init.d/resize2fs_once` inside an `on_chroot` block that
      # aborts the whole build on the first failing command. Confirmed
      # directly against RPi-Distro/raspberrypi-sys-mods (the package
      # that historically provided that init script): zero references to
      # resize2fs_once anywhere in its current source or history — it's
      # a leftover from an older Raspberry Pi OS generation that no
      # longer exists to be disabled/removed, so this now hard-fails any
      # pi-gen build of teslausb's image, unrelated to CI mechanics.
      #
      # This patches our own ephemeral CI checkout only — never
      # teslausb's actual repo — making those three specific commands
      # tolerate already being gone, without changing what they do if the
      # service ever does exist. Drop this once the upstream fix lands.
      - name: Patch stale resize2fs_once references (reported upstream)
        run: |
          sed -i \
            -e 's/^systemctl disable resize2fs_once$/systemctl disable resize2fs_once || true/' \
            -e 's/^update-rc.d resize2fs_once remove$/update-rc.d resize2fs_once remove || true/' \
            -e 's/^rm \/etc\/init.d\/resize2fs_once$/rm -f \/etc\/init.d\/resize2fs_once/' \
            teslausb/pi-gen-sources/00-teslausb-tweaks/00-run.sh

      # prepare.sh checks that `readlink -f .` ends in /pi-gen, so it
      # must be run from inside that checkout, not just given a path to it.
      # Its own final message says to use either "./build.sh" or
      # "./build-docker.sh" — both are equally sanctioned by teslausb.
      - name: Prepare pi-gen with teslausb's stage
        working-directory: pi-gen
        run: ../teslausb/pi-gen-sources/prepare.sh

      # Real finding after four failed attempts at build-docker.sh: that
      # path builds pi-gen's OWN build container (an i386/debian:trixie
      # image) and re-registers/re-mounts binfmt_misc *inside* it via
      # `dpkg-reconfigure qemu-user-binfmt`. Since Linux supports multiple
      # independent binfmt_misc instances per mount namespace, that
      # container-side mount can end up entirely separate from whatever
      # we registered on the host (via docker/setup-qemu-action or
      # otherwise) — which is consistent with every host-side fix so far
      # making zero difference to the exact same "armhf: not supported on
      # this machine/kernel" failure from build.sh's arch-test, run
      # inside that container.
      #
      # ubuntu-latest runners are real, full Ubuntu VMs, not a
      # Docker-only dev laptop (the reason build-docker.sh exists at all
      # is to let pi-gen build from non-Debian hosts like macOS). So
      # there's no need for that nested container here: install pi-gen's
      # real dependency list (from its own `depends` file / README)
      # straight onto the runner and run build.sh natively as root.
      #
      # qemu-user-binfmt alone got build.sh's own top-level arch-test to
      # pass ("armhf: ok" for emulated) but then debootstrap's *second*,
      # separate arch check — `arch-test -c "$TARGET" "$ARCH"`, which
      # execs from *inside* the target chroot directory, per debootstrap's
      # own source — failed with "Unable to execute target architecture".
      # qemu-user-binfmt's registration (via the plain dynamic
      # /usr/bin/qemu-arm from the qemu-user package) isn't built for
      # that: qemu-user-static ships purpose-built for exactly this
      # debootstrap-into-a-foreign-chroot case, registering binfmt_misc
      # via its own wrapper scripts (/usr/libexec/qemu-binfmt/arm-binfmt-P)
      # designed to keep working when exec happens from inside a chroot
      # with none of the host's filesystem visible.
      #
      # Can't install both, though — Debian marks qemu-user-binfmt and
      # qemu-user-static as mutually Conflicts:, since both try to
      # register the same binfmt_misc names. And pi-gen's own
      # dependencies_check (scripts/dependencies_check) does a plain
      # `hash qemu-arm` — a PATH lookup for a binary literally named
      # qemu-arm, which is all qemu-user-binfmt was ever providing for
      # that check, not anything specific to its (worse, for our case)
      # registration. qemu-user-static ships qemu-arm-static instead, so
      # symlink that to the name pi-gen's dependency check actually looks
      # for, and get qemu-user-static's chroot-safe registration alone.
      - name: Install pi-gen build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static \
            debootstrap zerofree zip dosfstools e2fsprogs libarchive-tools \
            libcap2-bin grep rsync xz-utils file git curl bc gpg pigz xxd \
            arch-test bmap-tools kmod
          sudo ln -sf /usr/bin/qemu-arm-static /usr/bin/qemu-arm

      - name: Build image
        working-directory: pi-gen
        run: sudo ./build.sh

      - name: Locate built image
        id: locate
        working-directory: pi-gen/deploy
        run: |
          image_path=$(ls -1 | head -n 1)
          if [ -z "$image_path" ]; then
            echo "No deploy artifact found" >&2
            exit 1
          fi
          echo "image_path=pi-gen/deploy/$image_path" >> "$GITHUB_OUTPUT"
          echo "image_name=$image_path" >> "$GITHUB_OUTPUT"

      # Cheap insurance so a failed release-publish step below doesn't
      # lose the build output — this always runs regardless of what
      # happens next.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: teslausb-baseline-image
          path: ${{ steps.locate.outputs.image_path }}
          retention-days: 14

      # Draft, not just prerelease: this build is unverified against real
      # hardware until Milestone C. A draft is invisible to normal repo
      # visitors until a maintainer deliberately publishes it.
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="baseline-image-${{ github.run_number }}"
          gh release create "$tag" \
            "pi-gen/deploy/${{ steps.locate.outputs.image_name }}" \
            --draft \
            --title "Baseline teslausb image (run ${{ github.run_number }})" \
            --notes "Unmodified teslausb image built via CI (Milestone A of the pi-gen distribution work). No teslausb-companion pi-service included yet. Not verified on real hardware — do not publish or flash until Milestone C confirms it."
